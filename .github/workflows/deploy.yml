name: Deploy Static HTML to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Use "catchup" once after manually uploading all files to Hostinger.'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - catchup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ftp
        run: |
          sudo apt-get update
          sudo apt-get install git-ftp -y

      - name: Create git-ftp ignore file
        run: |
          cat > .git-ftp-ignore << 'EOF'
          .git*/
          .github/
          node_modules/
          README.md
          EOF

      - name: Sync/Deploy via Git-FTP
        run: |
          USER_ACTION="${{ github.event.inputs.action || 'push' }}"

          FTP_URL="ftp://${{ secrets.FTP_SERVER }}/${{ secrets.FTP_REMOTE_DIR }}"

          if [ "$USER_ACTION" = "catchup" ]; then
            echo "Marking current commit as already deployed..."
            git ftp catchup \
              --user "${{ secrets.FTP_USERNAME }}" \
              --passwd "${{ secrets.FTP_PASSWORD }}" \
              "$FTP_URL" \
              --disable-epsv \
              --verbose
          else
            echo "Deploying changed files only..."
            git ftp push \
              --user "${{ secrets.FTP_USERNAME }}" \
              --passwd "${{ secrets.FTP_PASSWORD }}" \
              "$FTP_URL" \
              --disable-epsv \
              --verbose
          fi