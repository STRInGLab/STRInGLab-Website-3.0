name: Deploy Static HTML to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Use catchup once after manually uploading files, or init for first full upload.'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - catchup
          - init

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ftp
        run: |
          sudo apt-get update
          sudo apt-get install git-ftp -y

      - name: Create git-ftp ignore file
        run: |
          cat > .git-ftp-ignore << 'EOF'
          .git*/
          .github/
          node_modules/
          README.md
          EOF

      - name: Sync/Deploy via Git-FTP
        run: |
          USER_ACTION="${{ github.event.inputs.action || 'push' }}"

          FTP_REMOTE_DIR="${{ secrets.FTP_REMOTE_DIR }}"
          FTP_URL="ftp://${{ secrets.FTP_SERVER }}/${FTP_REMOTE_DIR}"

          echo "Selected action: $USER_ACTION"
          echo "Remote directory: ${FTP_REMOTE_DIR}"

          if [ -z "$FTP_REMOTE_DIR" ]; then
            echo "ERROR: FTP_REMOTE_DIR secret is empty. Set it to public_html/ or domains/example.com/public_html/"
            exit 1
          fi

          if [ "$USER_ACTION" = "catchup" ]; then
            echo "Running catchup..."
            git ftp catchup \
              --user "${{ secrets.FTP_USERNAME }}" \
              --passwd "${{ secrets.FTP_PASSWORD }}" \
              "$FTP_URL" \
              --disable-epsv \
              --verbose

          elif [ "$USER_ACTION" = "init" ]; then
            echo "Running initial full upload..."
            git ftp init \
              --user "${{ secrets.FTP_USERNAME }}" \
              --passwd "${{ secrets.FTP_PASSWORD }}" \
              "$FTP_URL" \
              --disable-epsv \
              --verbose

          else
            echo "Running differential push..."
            git ftp push \
              --user "${{ secrets.FTP_USERNAME }}" \
              --passwd "${{ secrets.FTP_PASSWORD }}" \
              "$FTP_URL" \
              --disable-epsv \
              --verbose
          fi