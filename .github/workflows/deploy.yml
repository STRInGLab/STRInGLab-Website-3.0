name: Deploy Static HTML to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment Action -> Use "catchup" ONCE after manually uploading all your files to Hostinger.'
        required: true
        default: 'push'
        type: choice
        options:
        - push
        - catchup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for delta deployments

      - name: Install git-ftp
        run: sudo apt-get install git-ftp -y

      - name: Sync/Deploy via Git-FTP
        run: |
          # Write ignore rules to .git-ftp-ignore
          echo ".git*/" >> .git-ftp-ignore
          echo "node_modules/" >> .git-ftp-ignore
          echo ".github/" >> .git-ftp-ignore
          echo "README.md" >> .git-ftp-ignore

          USER_ACTION="${{ github.event.inputs.action || 'push' }}"
          
          if [ "$USER_ACTION" == "catchup" ]; then
            echo "Running catchup to mark current commit as already deployed on Hostinger..."
            git ftp catchup --user "${{ secrets.FTP_USERNAME }}" --passwd "${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_SERVER }}/
          else
            echo "Running differential push to deploy ONLY the files modified in this commit..."
            git ftp push --user "${{ secrets.FTP_USERNAME }}" --passwd "${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_SERVER }}/ --auto-init
          fi