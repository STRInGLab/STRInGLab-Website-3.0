name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ftp
        run: |
          sudo apt-get update
          sudo apt-get install git-ftp -y

      - name: Create git-ftp ignore file
        run: |
          cat > .git-ftp-ignore << 'EOF'
          .git*/
          .github/
          node_modules/
          README.md
          EOF

      - name: Deploy changed files to Hostinger
        run: |
          git ftp push \
            --user "${{ secrets.FTP_USERNAME }}" \
            --passwd "${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/" \
            --disable-epsv \
            --verbose