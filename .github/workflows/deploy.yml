name: Deploy Static HTML to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }} #vprpca
          password: ${{ secrets.FTP_PASSWORD }} #i?Yv9fSpdVPJasr0
          # '.' tells the action to upload everything in your repo root
          local-dir: ./ 
          # Hostinger usually uses ./public_html/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md